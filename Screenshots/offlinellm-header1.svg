<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1114"></stop>
      <stop offset="100%" stop-color="#181b20"></stop>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#d1d5db" stop-opacity="0.06"></stop>
      <stop offset="100%" stop-color="#d1d5db" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#9ca3af" stop-opacity="0.05"></stop>
      <stop offset="100%" stop-color="#9ca3af" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#374151"></stop>
      <stop offset="50%" stop-color="#9ca3af"></stop>
      <stop offset="100%" stop-color="#374151"></stop>
    </linearGradient>

    
    <filter id="emboss" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6" result="blur"></feGaussianBlur>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.9" specularExponent="18" lighting-color="#ffffff" result="spec">
        <feDistantLight azimuth="225" elevation="55"></feDistantLight>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specMasked"></feComposite>
      <feMerge>
        <feMergeNode in="SourceGraphic"></feMergeNode>
        <feMergeNode in="specMasked"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  
  <rect width="900" height="260" rx="12" fill="url(#bg)"></rect>
  <rect width="900" height="260" rx="12" fill="url(#glow1)"></rect>
  <rect width="900" height="260" rx="12" fill="url(#glow2)"></rect>

  
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="52" x2="900" y2="52"></line>
    <line x1="0" y1="104" x2="900" y2="104"></line>
    <line x1="0" y1="156" x2="900" y2="156"></line>
    <line x1="0" y1="208" x2="900" y2="208"></line>
  </g>

  
  <g opacity="0.035" stroke="#ffffff" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="260"></line>
    <line x1="450" y1="0" x2="450" y2="260"></line>
    <line x1="700" y1="0" x2="700" y2="260"></line>
  </g>

  
  <g transform="translate(40, 55)">
