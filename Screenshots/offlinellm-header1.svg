  <text x="200" y="92" font-family="-apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-size="48" font-weight="700" fill="#e5e7eb" letter-spacing="-1" filter="url(#emboss)">OfflineLLM</text>

  
  <text x="200" y="120" font-family="-apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-size="15" font-weight="400" fill="#8b8f96">Private AI. On Device. Always Offline.</text>

  
  <g transform="translate(200, 140)" font-family="-apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-size="11" font-weight="500">
    
    <rect x="0" y="0" width="112" height="24" rx="12" fill="#1f2328" stroke="#3a3f47" stroke-width="1"></rect>
    <text x="56" y="16" text-anchor="middle" fill="#f3f4f6">100% Offline</text>

    
    <rect x="120" y="0" width="130" height="24" rx="12" fill="#1f2328" stroke="#3a3f47" stroke-width="1"></rect>
