    <text x="372" y="16" text-anchor="middle" fill="#e5e7eb">Biometric Lock</text>

    
    <rect x="440" y="0" width="118" height="24" rx="12" fill="#1f2328" stroke="#3a3f47" stroke-width="1"></rect>
    <text x="499" y="16" text-anchor="middle" fill="#e5e7eb">Text-to-Speech</text>

    
    <rect x="566" y="0" width="104" height="24" rx="12" fill="#1f2328" stroke="#3a3f47" stroke-width="1"></rect>
