  </g>

  
  <rect x="200" y="200" width="240" height="2" rx="1" fill="url(#accent)"></rect>

  
  <g transform="translate(200, 215)" font-family="&#39;SF Mono&#39;, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#6b7280" letter-spacing="0.06em">
    <text x="0" y="12">ANDROID 14+</text>
    <text x="92" y="12" fill="#4b5563">·</text>
    <text x="104" y="12">APACHE 2.0</text>
    <text x="194" y="12" fill="#4b5563">·</text>
    <text x="206" y="12">KOTLIN + COMPOSE</text>
    <text x="348" y="12" fill="#4b5563">·</text>
    <text x="360" y="12" fill="#d1d5db">v5.0.1</text>
  </g>

  
  <g stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" opacity="0.3" fill="none">
    <path d="M 870 20 L 880 20 L 880 30"></path>
    <path d="M 870 240 L 880 240 L 880 230"></path>
    <path d="M 30 20 L 20 20 L 20 30"></path>
    <path d="M 30 240 L 20 240 L 20 230"></path>
