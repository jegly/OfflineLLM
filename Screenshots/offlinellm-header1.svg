    <rect x="1" y="1" width="138" height="138" rx="17" fill="none" stroke="#3a3f47" stroke-width="0.5" opacity="0.6"></rect>
    
    <g transform="translate(70,70)">
      <circle cx="0" cy="0" r="44" fill="none" stroke="#d1d5db" stroke-width="3" opacity="0.9"></circle>
      <circle cx="0" cy="0" r="32" fill="none" stroke="#6b7280" stroke-width="1.5" opacity="0.6"></circle>
      
      <line x1="-30" y1="30" x2="30" y2="-30" stroke="#d1d5db" stroke-width="3" stroke-linecap="round" opacity="0.9"></line>
    </g>
