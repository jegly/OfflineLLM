    <rect x="258" y="0" width="140" height="24" rx="12" fill="#15171a" stroke="#4b5058" stroke-width="1"></rect>
    <text x="328" y="16" text-anchor="middle" fill="#d1d5db">Zero Net Permissions</text>

    
    <rect x="406" y="0" width="128" height="24" rx="12" fill="#1f2328" stroke="#3a3f47" stroke-width="1"></rect>
    <text x="470" y="16" text-anchor="middle" fill="#e5e7eb">Bring Your Own GGUF</text>

    
    <rect x="542" y="0" width="126" height="24" rx="12" fill="#1f2328" stroke="#3a3f47" stroke-width="1"></rect>
    <text x="605" y="16" text-anchor="middle" fill="#e5e7eb">75+ Translator Langs</text>
  </g>

  
  <g transform="translate(200, 172)" font-family="-apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-size="11" font-weight="500">
    
    <rect x="0" y="0" width="140" height="24" rx="12" fill="#1f2328" stroke="#3a3f47" stroke-width="1"></rect>
    <text x="70" y="16" text-anchor="middle" fill="#e5e7eb">Streaming 25–60 tok/s</text>

    
    <rect x="148" y="0" width="156" height="24" rx="12" fill="#15171a" stroke="#4b5058" stroke-width="1"></rect>
    <text x="226" y="16" text-anchor="middle" fill="#d1d5db">ARM NEON · SVE · i8mm</text>

    
